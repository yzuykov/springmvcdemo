<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Thymeleaf + Spring Security</title>
    <div th:replace="fragments/header :: header-css"></div>
</head>
<body>
<div th:replace="fragments/header :: navigate"></div>
<div class="container-fluid">
    <h1>News:</h1>
    <table id="newsTable" class="table">
        <thead>
        <tr>
            <th scope="col">Date</th>
            <th scope="col">Title</th>
            <th scope="col">Author</th>
            <th scope="col">Description</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(newsList)}">
            <td colspan="4" class="text-center">No news available</td>
        </tr>
        <tr th:each="article : ${newsList}">
            <td th:text="${article.publishedAt != null ? #temporals.format(article.publishedAt, 'dd-MM-yyyy HH:mm') : 'N/A'}">N/A</td>
            <td th:text="${article.title}">Title</td>
            <td th:text="${article.author ?: 'Unknown'}">Author</td>
            <td th:text="${article.description ?: 'No description'}">Description</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
